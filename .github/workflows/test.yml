name: Test wagtailterms

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Tests: Py ${{ matrix.python-version }} / Wagtail ${{ matrix.wagtail-version }}"
    strategy:
      # Allows all jobs to finish even if one fails
      fail-fast: false
      matrix:
        python-version: ["3.10" ,"3.11", "3.12", "3.13", "3.14"]
        wagtail-version: ["6.3", "6.4", "7.0", "7.1", "7.2", "7.3"]
        django-version: ["4.2", "5.0", "5.1","5.2", "6.0"]

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set env
        run: echo "RELEASE_VERSION=0.0.1" >> $GITHUB_ENV
      - name: Install Dependencies
        run: |
          pip install "Django~=${{ matrix.django-version }}.0"
          pip install "wagtail~=${{ matrix.wagtail-version }}.0"
          pip install -e .
      - name: Run Tests
        run: |
          cd example
          python manage.py test wagtailterms
