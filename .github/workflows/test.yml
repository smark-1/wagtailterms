name: Test wagtailterms

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest
    name: "Tests: Py ${{ matrix.python-version }} / Wagtail ${{ matrix.wagtail-version }} / Django ${{ matrix.django-version }}"
    strategy:
      # Allows all jobs to finish even if one fails
      fail-fast: false
      matrix:
          include:
            - python-version: "3.10"
              django-version: "4.2"
              wagtail-version: "6.3"

            - python-version: "3.12"
              django-version: "5.2"
              wagtail-version: "7.0"

            - python-version: "3.13"
              django-version: "5.2"
              wagtail-version: "7.3"

            - python-version: "3.13"
              django-version: "6.0"
              wagtail-version: "7.3"

            - python-version: "3.14"
              django-version: "6.0"
              wagtail-version: "7.3"

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set env
        run: echo "RELEASE_VERSION=0.0.1" >> $GITHUB_ENV
      - name: Install Dependencies
        run: |
          pip install "Django~=${{ matrix.django-version }}.0"
          pip install "wagtail~=${{ matrix.wagtail-version }}.0"
          pip install -e .
      - name: Run Tests
        run: |
          cd example
          python manage.py test wagtailterms
